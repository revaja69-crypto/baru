<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cashflow UMKM Pro</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
</head>
<body>
  
  <div class="app-container">
    <header class="glass-header">
      <h1>Inventaris & Kas</h1>
      <button id="installBtn" class="btn-neon" style="display: none;">Install App</button>
    </header>

    <main>
      <section class="dashboard-cards">
        <div class="card neon-blue">
          <h3>Total Kas Masuk</h3>
          <p id="kasMasukTxt">Rp 0</p>
        </div>
        <div class="card neon-pink">
          <h3>Total Kategori Stok</h3>
          <p id="totalStokTxt">0 Kategori</p>
        </div>
      </section>

      <section class="action-area">
        <button class="btn-action" onclick="openModal('categoryModal')">
          + Tambah Kategori
        </button>
        <button class="btn-action" onclick="openModal('transactionModal')" style="background: linear-gradient(135deg, #00F0FF, #3B82F6);">
          + Tambah Transaksi (Uji Coba)
        </button>
      </section>

      <section id="categoryList" class="category-grid"></section>

      <section class="report-section glass-panel">
        <div class="report-header">
          <h2>Riwayat Transaksi</h2>
          <select id="filterType" onchange="renderTransactions()" class="neon-input">
            <option value="all">Semua Transaksi</option>
            <option value="cash_in">Uang Masuk</option>
            <option value="cash_out">Uang Keluar</option>
          </select>
        </div>
        <div class="table-responsive">
          <table class="neon-table">
            <thead>
              <tr>
                <th>Tanggal</th>
                <th>Keterangan</th>
                <th>Tipe</th>
                <th>Jumlah</th>
              </tr>
            </thead>
            <tbody id="transactionTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div id="categoryModal" class="modal-overlay">
    <div class="modal-content glass">
      <div class="modal-header">
        <h2>Tambah Kategori</h2>
        <button class="close-btn" onclick="closeModal('categoryModal')">×</button>
      </div>
      <div class="modal-body">
        <div class="input-group">
          <label>Nama Kategori</label>
          <input type="text" id="catName" class="neon-input" placeholder="Contoh: Elektronik" style="width: 100%; margin-bottom: 10px;">
        </div>
        <div class="input-group">
          <label>Pilih Icon (Klik Emoji)</label>
          <div class="icon-picker" style="font-size: 24px; cursor: pointer; margin-bottom: 10px;">
            <span onclick="selectIcon('??')">??</span>
            <span onclick="selectIcon('??')">??</span>
            <span onclick="selectIcon('??')">??</span>
            <span onclick="selectIcon('??')">??</span>
          </div>
          <input type="text" id="catIcon" class="neon-input" readonly placeholder="Icon terpilih" style="width: 100%;">
        </div>
      </div>
      <div class="modal-footer" style="margin-top: 20px;">
        <button class="btn-neon" onclick="saveCategory()">Simpan Kategori</button>
      </div>
    </div>
  </div>

  <div id="transactionModal" class="modal-overlay">
    <div class="modal-content glass">
      <div class="modal-header">
        <h2>Catat Transaksi</h2>
        <button class="close-btn" onclick="closeModal('transactionModal')">×</button>
      </div>
      <div class="modal-body">
        <div class="input-group">
          <label>Jenis</label>
          <select id="txType" class="neon-input" style="width: 100%; margin-bottom: 10px;">
            <option value="cash_in">Pemasukan (Cash In)</option>
            <option value="cash_out">Pengeluaran (Cash Out)</option>
          </select>
        </div>
        <div class="input-group">
          <label>Jumlah (Rp)</label>
          <input type="number" id="txAmount" class="neon-input" placeholder="50000" style="width: 100%; margin-bottom: 10px;">
        </div>
        <div class="input-group">
          <label>Keterangan</label>
          <input type="text" id="txDesc" class="neon-input" placeholder="Penjualan 1x Kaos" style="width: 100%;">
        </div>
      </div>
      <div class="modal-footer" style="margin-top: 20px;">
        <button class="btn-neon" onclick="saveTransaction()">Simpan Transaksi</button>
      </div>
    </div>
  </div>

  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
